<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Kasir (POS) - Soto Banjar "Nyaman"</title>
<script src="https://cdn.tailwindcss.com"></script>
<style>
  @media print {
    body * { visibility: hidden; }
    #receiptPrintArea, #receiptPrintArea * { visibility: visible; }
    #receiptPrintArea {
      position: absolute; top: 0; left: 0; width: 100%;
    }
  }
  #receiptPrintArea { display: none; }
</style>
</head>
<body class="bg-gray-50 min-h-screen">

<nav id="navbar" class="bg-white shadow-sm sticky top-0 z-10"></nav>

<main class="max-w-7xl mx-auto px-4 sm:px-6 py-6">
  <div class="grid grid-cols-1 lg:grid-cols-3 gap-6">

    <!-- LEFT: Menu list -->
    <div class="lg:col-span-2">
      <div class="flex items-center justify-between mb-4">
        <h1 class="text-xl font-bold text-gray-800">Pilih Menu</h1>
        <div id="categoryTabs" class="flex gap-2 overflow-x-auto"></div>
      </div>
      <div class="relative mb-4">
        <span class="absolute inset-y-0 left-0 flex items-center pl-3 text-gray-400">
          <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-4.35-4.35M11 19a8 8 0 100-16 8 8 0 000 16z" /></svg>
        </span>
        <input
          type="text" id="menuSearchInput" placeholder="Cari menu..."
          class="w-full pl-10 pr-4 py-2.5 border border-gray-200 rounded-xl text-sm focus:ring-2 focus:ring-orange-500 focus:border-orange-500 outline-none transition bg-white shadow-sm"
          oninput="onSearchInput()"
        />
      </div>
      <div id="menuGrid" class="grid grid-cols-2 sm:grid-cols-3 gap-3"></div>
    </div>

    <!-- RIGHT: Cart -->
    <div class="lg:col-span-1">
      <div class="bg-white rounded-2xl shadow-lg sticky top-24 flex flex-col max-h-[calc(100vh-7rem)]">
        <div class="px-5 py-4 border-b border-gray-100">
          <h2 class="font-bold text-gray-800 text-lg">Pesanan Berjalan</h2>
        </div>

        <div id="cartItems" class="flex-1 overflow-y-auto px-5 py-3 space-y-3 min-h-[120px]">
          <p class="text-sm text-gray-400 text-center py-8">Keranjang masih kosong. Klik menu di sebelah kiri.</p>
        </div>

        <div class="px-5 py-4 border-t border-gray-100 space-y-3 bg-gray-50 rounded-b-2xl">
          <div class="flex items-center justify-between text-sm">
            <span class="text-gray-500">Subtotal</span>
            <span class="font-semibold text-gray-700" id="subtotalDisplay">Rp 0</span>
          </div>

          <div class="flex items-center justify-between gap-3">
            <label class="text-sm text-gray-500 whitespace-nowrap">Diskon (%)</label>
            <input
              type="number" id="discountInput" min="0" max="100" value="0"
              class="w-24 px-3 py-2 border border-gray-300 rounded-lg text-right focus:ring-2 focus:ring-orange-500 outline-none"
            />
          </div>

          <div class="flex items-center justify-between text-sm">
            <span class="text-gray-500">Potongan Diskon</span>
            <span class="font-semibold text-red-500" id="discountDisplay">- Rp 0</span>
          </div>

          <div class="flex items-center justify-between text-lg pt-2 border-t border-gray-200">
            <span class="font-bold text-gray-800">Grand Total</span>
            <span class="font-extrabold text-orange-700" id="grandTotalDisplay">Rp 0</span>
          </div>

          <div class="pt-1">
            <label class="text-sm text-gray-500 block mb-1.5">Metode Pembayaran</label>
            <div id="paymentMethodButtons" class="grid grid-cols-4 gap-1.5"></div>
          </div>

          <div class="flex gap-2 pt-2">
            <button
              onclick="clearCart()"
              class="flex-1 py-3 rounded-xl border border-gray-300 text-gray-600 font-semibold hover:bg-gray-100 transition text-sm"
            >
              Kosongkan
            </button>
            <button
              id="checkoutBtn"
              onclick="checkout()"
              class="flex-[2] py-3 rounded-xl bg-orange-600 hover:bg-orange-700 text-white font-bold shadow-lg shadow-orange-200 transition text-sm"
            >
              Selesaikan Pesanan
            </button>
          </div>
        </div>
      </div>
    </div>
  </div>
</main>

<!-- Receipt Modal -->
<div id="receiptModal" class="hidden fixed inset-0 bg-black/50 z-30 flex items-center justify-center p-4">
  <div class="bg-white rounded-2xl shadow-2xl max-w-sm w-full max-h-[90vh] overflow-y-auto">
    <div id="receiptContent" class="p-6 font-mono text-sm text-gray-800"></div>
    <div class="p-4 border-t border-gray-100 flex gap-2">
      <button onclick="closeReceipt()" class="flex-1 py-3 rounded-xl border border-gray-300 text-gray-600 font-semibold text-sm">Tutup</button>
      <button onclick="printReceipt()" class="flex-1 py-3 rounded-xl bg-gray-800 hover:bg-gray-900 text-white font-semibold text-sm">🖨️ Cetak Nota</button>
    </div>
  </div>
</div>

<!-- Hidden print area (thermal receipt format) -->
<div id="receiptPrintArea"></div>

<script src="/js/auth.js"></script>
<script>
  requireAuth();
  renderNavbar("pos");

  let menuData = [];
  let cart = JSON.parse(localStorage.getItem('pos_cart') || '[]');
  let activeCategory = "Semua";
  let searchQuery = "";
  let lastTransaction = null;

  const PAYMENT_METHODS = [
    { value: "qris", label: "QRIS" },
    { value: "transfer", label: "Transfer" },
    { value: "cash", label: "Cash" },
  ];
  let selectedPaymentMethod = localStorage.getItem('pos_payment') || 'qris';

  // Initialize discount from localStorage
  document.addEventListener("DOMContentLoaded", () => {
    document.getElementById("discountInput").value = localStorage.getItem('pos_discount') || '0';
  });

  function saveCartState() {
    localStorage.setItem('pos_cart', JSON.stringify(cart));
    localStorage.setItem('pos_payment', selectedPaymentMethod);
    const discountEl = document.getElementById("discountInput");
    if (discountEl) {
      localStorage.setItem('pos_discount', discountEl.value);
    }
  }

  function renderPaymentMethodButtons() {
    const el = document.getElementById("paymentMethodButtons");
    el.innerHTML = PAYMENT_METHODS.map(
      (m) => `
      <button
        type="button"
        onclick="setPaymentMethod('${m.value}')"
        class="py-2 rounded-lg text-xs font-semibold border transition ${
          selectedPaymentMethod === m.value
            ? "bg-orange-600 text-white border-orange-600"
            : "bg-white text-gray-500 border-gray-300 hover:border-orange-300"
        }"
      >${m.label}</button>`
    ).join("");
  }

  function setPaymentMethod(value) {
    selectedPaymentMethod = value;
    saveCartState();
    renderPaymentMethodButtons();
  }

  async function loadMenu() {
    try {
      menuData = await apiFetch("/api/menu");
      renderCategoryTabs();
      renderMenuGrid();
    } catch (err) {
      document.getElementById("menuGrid").innerHTML = `<p class="text-red-500 col-span-full">Gagal memuat menu: ${err.message}</p>`;
    }
  }

  renderPaymentMethodButtons();

  function renderCategoryTabs() {
    const categories = ["Semua", ...new Set(menuData.map((m) => m.category))];
    const tabsEl = document.getElementById("categoryTabs");
    tabsEl.innerHTML = categories
      .map(
        (cat) => `
      <button
        onclick="setCategory('${cat.replace(/'/g, "\\'")}')"
        class="px-3 py-1.5 rounded-lg text-xs font-semibold whitespace-nowrap transition ${
          activeCategory === cat ? "bg-orange-600 text-white" : "bg-white text-gray-500 border border-gray-200"
        }"
      >${cat}</button>`
      )
      .join("");
  }

  function setCategory(cat) {
    activeCategory = cat;
    renderCategoryTabs();
    renderMenuGrid();
  }

  function renderMenuGrid() {
    let filtered =
      activeCategory === "Semua" ? menuData : menuData.filter((m) => m.category === activeCategory);
    if (searchQuery) {
      filtered = filtered.filter((m) => m.name.toLowerCase().includes(searchQuery));
    }
    const grid = document.getElementById("menuGrid");
    if (filtered.length === 0) {
      grid.innerHTML = `<p class="text-gray-400 col-span-full text-center py-8">${searchQuery ? 'Menu tidak ditemukan.' : 'Tidak ada menu di kategori ini.'}</p>`;
      return;
    }
    grid.innerHTML = filtered
      .map(
        (item) => `
      <button
        onclick="addToCart(${item.id})"
        class="bg-white rounded-xl shadow hover:shadow-lg hover:-translate-y-0.5 active:scale-95 transition text-left p-4 border border-gray-100 hover:border-orange-300"
      >
        <p class="font-semibold text-gray-800 text-sm leading-snug mb-2">${item.name}</p>
        <p class="text-orange-600 font-bold">${formatRupiah(item.price)}</p>
      </button>`
      )
      .join("");
  }

  function onSearchInput() {
    searchQuery = document.getElementById("menuSearchInput").value.trim().toLowerCase();
    renderMenuGrid();
  }

  function addToCart(menuId) {
    const item = menuData.find((m) => m.id === menuId);
    if (!item) return;
    const existing = cart.find((c) => c.menu_id === menuId);
    if (existing) {
      existing.quantity += 1;
    } else {
      cart.push({ menu_id: item.id, name: item.name, price: item.price, quantity: 1 });
    }
    renderCart();
  }

  function changeQty(menuId, delta) {
    const item = cart.find((c) => c.menu_id === menuId);
    if (!item) return;
    item.quantity += delta;
    if (item.quantity <= 0) {
      cart = cart.filter((c) => c.menu_id !== menuId);
    }
    renderCart();
  }

  function removeFromCart(menuId) {
    cart = cart.filter((c) => c.menu_id !== menuId);
    renderCart();
  }

  function clearCart() {
    cart = [];
    document.getElementById("discountInput").value = 0;
    selectedPaymentMethod = "qris";
    saveCartState();
    renderPaymentMethodButtons();
    renderCart();
  }

  function calcTotals() {
    const subtotal = cart.reduce((sum, item) => sum + item.price * item.quantity, 0);
    const discountPct = Math.min(100, Math.max(0, Number(document.getElementById("discountInput").value) || 0));
    const discountAmount = Math.round((subtotal * discountPct) / 100);
    const grandTotal = subtotal - discountAmount;
    return { subtotal, discountPct, discountAmount, grandTotal };
  }

  function renderCart() {
    const cartItemsEl = document.getElementById("cartItems");
    if (cart.length === 0) {
      cartItemsEl.innerHTML = `<p class="text-sm text-gray-400 text-center py-8">Keranjang masih kosong. Klik menu di sebelah kiri.</p>`;
    } else {
      cartItemsEl.innerHTML = cart
        .map(
          (item) => `
        <div class="flex items-start justify-between gap-2">
          <div class="flex-1 min-w-0">
            <p class="text-sm font-semibold text-gray-700 break-words">${item.name}</p>
            <p class="text-xs text-gray-400">${formatRupiah(item.price)}</p>
          </div>
          <div class="flex items-center gap-1.5">
            <button onclick="changeQty(${item.menu_id}, -1)" class="w-7 h-7 rounded-lg bg-gray-100 text-gray-600 font-bold hover:bg-gray-200">-</button>
            <span class="w-6 text-center text-sm font-semibold">${item.quantity}</span>
            <button onclick="changeQty(${item.menu_id}, 1)" class="w-7 h-7 rounded-lg bg-gray-100 text-gray-600 font-bold hover:bg-gray-200">+</button>
          </div>
          <p class="w-24 text-right text-sm font-bold text-gray-800">${formatRupiah(item.price * item.quantity)}</p>
          <button onclick="removeFromCart(${item.menu_id})" class="text-red-400 hover:text-red-600 text-sm">✕</button>
        </div>`
        )
        .join("");
    }

    const { subtotal, discountAmount, grandTotal } = calcTotals();
    document.getElementById("subtotalDisplay").textContent = formatRupiah(subtotal);
    document.getElementById("discountDisplay").textContent = "- " + formatRupiah(discountAmount);
    document.getElementById("grandTotalDisplay").textContent = formatRupiah(grandTotal);
    saveCartState();
  }

  document.getElementById("discountInput").addEventListener("input", renderCart);

  async function checkout() {
    if (cart.length === 0) {
      alert("Keranjang masih kosong.");
      return;
    }
    const { discountPct } = calcTotals();
    const btn = document.getElementById("checkoutBtn");
    btn.disabled = true;
    btn.textContent = "Memproses...";

    try {
      const payload = {
        items: cart.map((c) => ({ menu_id: c.menu_id, quantity: c.quantity })),
        discount_percent: discountPct,
        payment_method: selectedPaymentMethod,
      };
      const result = await apiFetch("/api/transactions", {
        method: "POST",
        body: JSON.stringify(payload),
      });
      lastTransaction = result;
      showReceipt(result);
      cart = [];
      document.getElementById("discountInput").value = 0;
      selectedPaymentMethod = "qris";
      saveCartState();
      renderPaymentMethodButtons();
      renderCart();
      renderMenuGrid();
    } catch (err) {
      alert("Gagal menyelesaikan transaksi: " + err.message);
    } finally {
      btn.disabled = false;
      btn.textContent = "Selesaikan Pesanan";
    }
  }

  const PAYMENT_LABELS = {
    cash: "Tunai (Cash)",
    qris: "QRIS",
    transfer: "Transfer Bank",
    gojek: "GoFood / Gojek",
    shopee: "ShopeeFood",
    other: "Lainnya",
  };

  function buildReceiptHtml(result) {
    const tx = result.transaction;
    const items = result.items;
    const dateStr = new Date(tx.created_at + "Z").toLocaleString("id-ID", {
      dateStyle: "medium",
      timeStyle: "short",
    });

    const itemsHtml = items
      .map(
        (item) => `
      <div class="flex justify-between text-xs mb-1">
        <span class="flex-1">${item.menu_name} x${item.quantity}</span>
        <span>${formatRupiah(item.line_total)}</span>
      </div>`
      )
      .join("");

    return `
      <div class="text-center mb-3">
        <p class="font-bold text-base">SOTO BANJAR "NYAMAN"</p>
        <p class="text-xs">Antasari</p>
        <p class="text-xs text-gray-500">${dateStr}</p>
        <p class="text-xs text-gray-500">No: ${tx.transaction_code}</p>
      </div>
      <div class="border-t border-dashed border-gray-400 my-2"></div>
      ${itemsHtml}
      <div class="border-t border-dashed border-gray-400 my-2"></div>
      <div class="flex justify-between text-xs mb-1">
        <span>Subtotal</span><span>${formatRupiah(tx.subtotal)}</span>
      </div>
      <div class="flex justify-between text-xs mb-1">
        <span>Diskon (${tx.discount_percent}%)</span><span>- ${formatRupiah(tx.discount_amount)}</span>
      </div>
      <div class="border-t border-dashed border-gray-400 my-2"></div>
      <div class="flex justify-between font-bold text-sm mb-2">
        <span>GRAND TOTAL</span><span>${formatRupiah(tx.grand_total)}</span>
      </div>
      <div class="flex justify-between text-xs">
        <span>Metode Bayar</span><span>${PAYMENT_LABELS[tx.payment_method] || tx.payment_method}</span>
      </div>
      <div class="border-t border-dashed border-gray-400 my-2"></div>
      <p class="text-center text-xs mt-2">Kasir: ${tx.cashier_username}</p>
      <p class="text-center text-xs mt-3">Terima kasih atas kunjungan Anda!</p>
      <p class="text-center text-xs">Sampai jumpa lagi 🙏</p>
    `;
  }

  function showReceipt(result) {
    const html = buildReceiptHtml(result);
    document.getElementById("receiptContent").innerHTML = html;
    document.getElementById("receiptPrintArea").innerHTML = `
      <div style="width: 280px; padding: 10px; font-family: monospace; font-size: 12px;">${html}</div>
    `;
    document.getElementById("receiptModal").classList.remove("hidden");
  }

  function closeReceipt() {
    document.getElementById("receiptModal").classList.add("hidden");
  }

  function printReceipt() {
    window.print();
  }

  // Set initial discount after elements exist but before renderCart is called explicitly
  document.getElementById("discountInput").value = localStorage.getItem('pos_discount') || '0';
  
  loadMenu();
  // Call renderCart initially to load the saved cart state visually
  renderCart();
</script>
</body>
</html>
