<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Manajemen Menu - Soto Banjar "Nyaman"</title>
<script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 min-h-screen">

<nav id="navbar" class="bg-white shadow-sm sticky top-0 z-10"></nav>

<main class="max-w-5xl mx-auto px-4 sm:px-6 py-8">
  <div class="flex items-center justify-between mb-6">
    <h1 class="text-2xl font-bold text-gray-800">Manajemen Menu</h1>
    <button
      onclick="openModal()"
      class="bg-orange-600 hover:bg-orange-700 text-white font-semibold px-5 py-2.5 rounded-xl shadow transition text-sm"
    >
      + Tambah Menu
    </button>
  </div>

  <div class="bg-white rounded-2xl shadow overflow-hidden">
    <div class="overflow-x-auto">
      <table class="w-full text-sm">
        <thead class="bg-gray-50 text-gray-500">
          <tr>
            <th class="text-left px-5 py-3 font-medium">Nama Menu</th>
            <th class="text-left px-5 py-3 font-medium">Kategori</th>
            <th class="text-right px-5 py-3 font-medium">Harga</th>
            <th class="text-center px-5 py-3 font-medium">Aksi</th>
          </tr>
        </thead>
        <tbody id="menuTableBody" class="divide-y divide-gray-100"></tbody>
      </table>
    </div>
  </div>
</main>

<!-- Modal -->
<div id="menuModal" class="hidden fixed inset-0 bg-black/50 z-30 flex items-center justify-center p-4">
  <div class="bg-white rounded-2xl shadow-2xl max-w-md w-full">
    <div class="px-6 py-4 border-b border-gray-100">
      <h2 class="font-bold text-gray-800 text-lg" id="modalTitle">Tambah Menu</h2>
    </div>
    <form id="menuForm" class="p-6 space-y-4">
      <input type="hidden" id="menuId" />
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">Nama Menu</label>
        <input type="text" id="menuName" required class="w-full px-4 py-2.5 border border-gray-300 rounded-xl focus:ring-2 focus:ring-orange-500 outline-none" />
      </div>
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">Kategori</label>
        <input type="text" id="menuCategory" required list="categoryList" placeholder="Utama & Paket / Tambahan & Minuman" class="w-full px-4 py-2.5 border border-gray-300 rounded-xl focus:ring-2 focus:ring-orange-500 outline-none" />
        <datalist id="categoryList"></datalist>
      </div>
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">Harga (Rp)</label>
        <input type="number" id="menuPrice" required min="0" class="w-full px-4 py-2.5 border border-gray-300 rounded-xl focus:ring-2 focus:ring-orange-500 outline-none" />
      </div>
      <div id="formError" class="hidden bg-red-50 text-red-600 text-sm rounded-lg px-4 py-2"></div>
      <div class="flex gap-2 pt-2">
        <button type="button" onclick="closeModal()" class="flex-1 py-3 rounded-xl border border-gray-300 text-gray-600 font-semibold text-sm">Batal</button>
        <button type="submit" class="flex-1 py-3 rounded-xl bg-orange-600 hover:bg-orange-700 text-white font-bold text-sm">Simpan</button>
      </div>
    </form>
  </div>
</div>

<script src="/js/auth.js"></script>
<script>
  requireAuth();
  renderNavbar("menu");

  let menuData = [];

  async function loadMenu() {
    try {
      menuData = await apiFetch("/api/menu");
      renderTable();
      updateCategoryList();
    } catch (err) {
      document.getElementById("menuTableBody").innerHTML = `<tr><td colspan="4" class="text-center text-red-500 py-8">Gagal memuat menu: ${err.message}</td></tr>`;
    }
  }

  function updateCategoryList() {
    const categories = [...new Set(menuData.map((m) => m.category))];
    document.getElementById("categoryList").innerHTML = categories.map((c) => `<option value="${c}"></option>`).join("");
  }

  function renderTable() {
    const tbody = document.getElementById("menuTableBody");
    if (menuData.length === 0) {
      tbody.innerHTML = `<tr><td colspan="4" class="text-center text-gray-400 py-8">Belum ada menu.</td></tr>`;
      return;
    }
    tbody.innerHTML = menuData
      .map(
        (item) => `
      <tr class="hover:bg-gray-50">
        <td class="px-5 py-3 font-medium text-gray-700">${item.name}</td>
        <td class="px-5 py-3 text-gray-500">${item.category}</td>
        <td class="px-5 py-3 text-right font-semibold text-gray-800">${formatRupiah(item.price)}</td>
        <td class="px-5 py-3">
          <div class="flex items-center justify-center gap-2">
            <button onclick='openModal(${JSON.stringify(item)})' class="px-3 py-1.5 rounded-lg bg-blue-50 text-blue-600 text-xs font-semibold hover:bg-blue-100">Edit</button>
            <button onclick="deleteMenu(${item.id})" class="px-3 py-1.5 rounded-lg bg-red-50 text-red-600 text-xs font-semibold hover:bg-red-100">Hapus</button>
          </div>
        </td>
      </tr>`
      )
      .join("");
  }

  function openModal(item) {
    document.getElementById("formError").classList.add("hidden");
    if (item) {
      document.getElementById("modalTitle").textContent = "Edit Menu";
      document.getElementById("menuId").value = item.id;
      document.getElementById("menuName").value = item.name;
      document.getElementById("menuCategory").value = item.category;
      document.getElementById("menuPrice").value = item.price;
    } else {
      document.getElementById("modalTitle").textContent = "Tambah Menu";
      document.getElementById("menuForm").reset();
      document.getElementById("menuId").value = "";
    }
    document.getElementById("menuModal").classList.remove("hidden");
  }

  function closeModal() {
    document.getElementById("menuModal").classList.add("hidden");
  }

  document.getElementById("menuForm").addEventListener("submit", async (e) => {
    e.preventDefault();
    const id = document.getElementById("menuId").value;
    const payload = {
      name: document.getElementById("menuName").value.trim(),
      category: document.getElementById("menuCategory").value.trim(),
      price: Number(document.getElementById("menuPrice").value),
    };

    try {
      if (id) {
        await apiFetch(`/api/menu/${id}`, { method: "PUT", body: JSON.stringify(payload) });
      } else {
        await apiFetch("/api/menu", { method: "POST", body: JSON.stringify(payload) });
      }
      closeModal();
      loadMenu();
    } catch (err) {
      const errEl = document.getElementById("formError");
      errEl.textContent = err.message;
      errEl.classList.remove("hidden");
    }
  });

  async function deleteMenu(id) {
    if (!confirm("Yakin ingin menghapus menu ini?")) return;
    try {
      await apiFetch(`/api/menu/${id}`, { method: "DELETE" });
      loadMenu();
    } catch (err) {
      alert("Gagal menghapus menu: " + err.message);
    }
  }

  loadMenu();
</script>
</body>
</html>
